name: nemeth-thesis
channels:
  - defaults
  - dglteam/label/cu117
  - conda-forge

dependencies:
  # Python and core
  - python=3.11.3
  - pip
  - setuptools>=61.0
  - setuptools_scm[toml]>=6.2
  
  # ML/Data Science Core
  - numpy
  - scipy==1.11.1
  - scikit-learn==1.3.0
  - pandas
  - matplotlib
  - seaborn
  
  # Chemistry
  - rdkit
  - networkx
  
  # GPU/Computation
  - pytorch::torch==2.0.1
  - pytorch::pytorch-cuda=11.8
  - dgl
  
  # Other tools
  - pyyaml
  - tqdm
  - pytest
  
  - pip:
    # Additional pip dependencies
    - charset-normalizer==2.1.0
    - deepsmiles
    - selfies
    - PyTDC
    - nltk
    - guacamol
    - pandas-stubs
    - joblib
    - gitpython
    - requests
    - jupyterlab
    - mols2grid

# Notes:
# - This environment combines requirements from:
#   * diverse-hits/divopt (pyproject.toml + envs/divopt.yml)
#   * DrugEx/Drugex (pyproject.toml)
#   * Additional development dependencies
# - Requires CUDA 11.8 compatible GPU or CPU-only PyTorch
# - To use CPU-only, replace pytorch::torch and pytorch::pytorch-cuda with: pytorch::cpuonly
