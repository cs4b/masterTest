name: drug-discovery-bench
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.11
  
  # PyTorch with CUDA support
  - pytorch=2.0.1=py3.11_cuda11.8_1
  - pytorch-cuda=11.8
  - torchvision
  - torchaudio
  
  # Core Scientific Stack
  - numpy=1.24
  - scipy=1.11.1
  - pandas=2.0
  - scikit-learn=1.3.0
  - matplotlib=3.7
  - seaborn=0.12
  
  # Chemistry & Bioinformatics
  - rdkit
  - networkx=3.1
  
  # Graph Neural Networks
  - dgl=1.1.2
  
  # Development & Data Science
  - jupyter
  - jupyterlab
  - ipython
  - ipywidgets
  
  # Build & Package Management
  - pip
  - setuptools
  
  # System Libraries
  - libffi
  - openssl
  - zlib
  
  # Git & Version Control
  - git
  - gitpython

  # Other utilities
  - tqdm
  - pyyaml
  - requests
  - joblib=1.3.2
  - pytest=7.4.3
  - pytest-cov
  
  # Pip packages (install via pip subdependency)
  - pip:
    - deepsmiles==1.2.3
    - selfies==2.1.1
    - PyTDC==0.4.0
    - guacamol==0.2.7
    - nltk==3.8.1
    - mols2grid==2.28.0
    - ray==2.7.0
    - optuna==3.3.0
    - tensorboard==2.14.0
    - wandb==0.15.12
    - black==23.12.0
    - flake8==6.1.0
